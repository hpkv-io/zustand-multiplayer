<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zustand Multiplayer Express Todos</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { text-align: center; color: #333; }
        input[type="text"] { width: calc(100% - 90px); padding: 10px; margin-right: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        ul { list-style-type: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        li:last-child { border-bottom: none; }
        li span { cursor: pointer; }
        li span.completed { text-decoration: line-through; color: #aaa; }
        li button.delete { background-color: #dc3545; font-size: 0.8em; padding: 5px 10px; }
        li button.delete:hover { background-color: #c82333; }
        .status { margin-top: 20px; padding: 10px; background-color: #e9ecef; border-radius: 4px; text-align: center; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        <div class="top-bar">
            <input type="text" id="todo-input" placeholder="Add a new todo">
            <button id="add-todo-btn">Add Todo</button>
        </div>
        <ul id="todo-list"></ul>
        <div id="connection-status" class="status">Status: Initializing...</div>
    </div>

    <!-- Configuration first -->
    <script src="config.js"></script>

    <!-- Zustand and Multiplayer Middleware (assuming you serve them or use a CDN/bundler) -->
    <!-- For this example, we'll assume they are bundled or available globally via CDN if not using ES modules directly in browser -->
    <!-- If using ES modules and store.js is an ES module, type="module" is needed for app.js -->
    
    <!-- Serve store.js from the src directory (adjust path if server serves it differently) -->
    <!-- For simplicity, server.js is set to serve 'public' not 'src' -->
    <!-- So, store.js should also be in public, or server needs to handle serving it from src -->
    <!-- Let's assume we copy or serve store.js into public/scripts for this example -->

    <script src="scripts/store.js" type="module"></script>
    <script src="app.js" type="module"></script>

</body>
</html>
