name: Pull Request Validation

on:
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm run test
        env:
          HPKV_API_BASE_URL: ${{ secrets.HPKV_API_BASE_URL }}
          HPKV_API_KEY: ${{ secrets.HPKV_API_KEY }}

      - name: Build
        run: npm run build

      - name: Verify build outputs
        run: npm run verify-build

      - name: Check bundle size
        run: |
          echo "📦 Bundle sizes:"
          echo "CommonJS: $(du -h dist/index.js | cut -f1)"
          echo "ES Module: $(du -h dist/index.mjs | cut -f1)"
          echo "Min CommonJS: $(du -h dist/index.min.js | cut -f1)"
          echo "Min ES Module: $(du -h dist/index.min.mjs | cut -f1)"
